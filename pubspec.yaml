name: guitar_buddy
description: "Guitar companion app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^3.2.1
  google_fonts: ^8.0.2
  material_symbols_icons: ^4.2906.0
  sqlite3: ^3.1.6
  sqflite_common_ffi: ^2.4.0+2
  path_provider: ^2.1.5
  path: ^1.9.1
  intl: ^0.20.2
  pitch_detector_dart: ^0.0.7
  pitchupdart: ^0.0.6
  record: ^6.2.0
  permission_handler: ^12.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/colorscheme.png

